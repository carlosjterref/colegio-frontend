        <h2 class="login-title">Portal Acudientes</h2>
        <p class="login-subtitle">Ingrese sus credenciales para continuar</p>
    </div>
    <div class="login-divider"></div>
    <form id="form-login" onsubmit="iniciarSesion(event)">
        <div class="mb-3">
            <label for="usuario" class="form-label fw-semibold" style="font-size:0.88rem;">
                <i class="bi bi-person me-1"></i>Usuario, Documento o Correo
            </label>
            <input type="text" class="form-control" id="usuario" placeholder="Usuario, documento o correo" required>
        </div>
        <div class="mb-4">
            <label for="password" class="form-label fw-semibold" style="font-size:0.88rem;">
                <i class="bi bi-lock me-1"></i>Contraseña
            </label>
            <input type="password" class="form-control" id="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-ingresar mb-3">
            <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar
        </button>
        <div class="text-center">
            <a href="#" class="forgot-link">¿Olvidó su contraseña?</a>
        </div>
        <div class="text-center">
            <a href="index.html" class="btn-volver">
                <i class="bi bi-arrow-left me-1"></i>Volver al inicio
            </a>
        </div>
    </form>
</div>

<script src="js/api.js"></script>
<script>
    async function iniciarSesion(event) {
        event.preventDefault(); // evita que el form recargue la página
        const usuario = document.getElementById('usuario').value.trim();
        const pass    = document.getElementById('password').value;

        try {
            await login(usuario, pass, 'acudiente');
            window.location.href = 'Portal-acudiente.html';
        } catch (err) {
            alert(err.message);
        }
    }
</script>
