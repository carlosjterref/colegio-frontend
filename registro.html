<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Colegio Yermo y Parres</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/home.css">
</head>
<body style="background-color:#f4f7f6;">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-colegio sticky-top">
    <div class="container-xl">
        <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
            <img src="img/escudo.png" alt="Escudo" class="escudo-nav">
            <span class="text-white fw-bold" style="font-size:0.95rem;">Yermo y Parres</span>
        </a>
        <a href="index.html" class="btn-volver text-white"><i class="bi bi-arrow-left me-1"></i>Volver al inicio</a>
    </div>
</nav>

<!-- BARRA TÍTULO -->
<div class="barra-titulo">
    <h2>Registro de Nuevo Estudiante</h2>
</div>

<section class="py-5">
    <div class="container-xl" style="max-width:900px;">
        <div class="alert alert-info d-flex align-items-center gap-2" role="alert" style="font-size:0.9rem;">
            <i class="bi bi-info-circle-fill"></i>
            <span>Este formulario crea la cuenta del <strong>estudiante</strong> y la de su <strong>acudiente</strong>. Los campos con <span class="text-danger">*</span> son obligatorios.</span>
        </div>

        <form id="form-registro">
            <!-- DATOS DEL ESTUDIANTE -->
            <div class="card shadow-sm border-0 mb-4">
                <div class="card-header fw-bold text-white" style="background:var(--verde);">
                    <i class="bi bi-person-badge me-2"></i>Datos del Estudiante
                </div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Nombres <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="est-nombre" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Apellidos <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="est-apellido" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Número de documento <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="est-documento" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Grado al que aspira <span class="text-danger">*</span></label>
                            <select class="form-select" id="est-grado" required>
                                <option value="">Seleccionar...</option>
                                <option value="0">Transición</option>
                                <option value="1">1°</option>
                                <option value="2">2°</option>
                                <option value="3">3°</option>
                                <option value="4">4°</option>
                                <option value="5">5°</option>
                                <option value="6">6°</option>
                                <option value="7">7°</option>
                                <option value="8">8°</option>
                                <option value="9">9°</option>
                                <option value="10">10°</option>
                                <option value="11">11°</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Correo electrónico</label>
                            <input type="email" class="form-control" id="est-correo" placeholder="opcional">
                        </div>
                        <div class="col-12"><hr class="my-1"><small class="text-muted">Credenciales de acceso del estudiante</small></div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Usuario <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="est-usuario" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Contraseña <span class="text-danger">*</span></label>
                            <input type="password" class="form-control" id="est-contrasena" minlength="4" required>
                        </div>
                    </div>
                </div>
            </div>

            <!-- DATOS DEL ACUDIENTE -->
            <div class="card shadow-sm border-0 mb-4">
                <div class="card-header fw-bold text-white" style="background:var(--verde);">
                    <i class="bi bi-people me-2"></i>Datos del Acudiente
                </div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Nombre completo <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="acu-nombre" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Número de documento <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="acu-documento" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Parentesco <span class="text-danger">*</span></label>
                            <select class="form-select" id="acu-parentesco" required>
                                <option value="">Seleccionar...</option>
                                <option>Madre</option>
                                <option>Padre</option>
                                <option>Abuelo/a</option>
                                <option>Tío/a</option>
                                <option>Hermano/a</option>
                                <option>Otro</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Correo electrónico</label>
                            <input type="email" class="form-control" id="acu-correo" placeholder="opcional">
                        </div>
                        <div class="col-12"><hr class="my-1"><small class="text-muted">Credenciales de acceso del acudiente</small></div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Usuario <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="acu-usuario" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Contraseña <span class="text-danger">*</span></label>
                            <input type="password" class="form-control" id="acu-contrasena" minlength="4" required>
                        </div>
                    </div>
                </div>
            </div>

            <div class="text-center">
                <button type="submit" class="btn btn-lg fw-bold text-white px-5" style="background:var(--verde);">
                    <i class="bi bi-check-circle me-2"></i>Registrar inscripción
                </button>
            </div>
        </form>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/registro.js"></script>
</body>
</html>
