<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingreso Docentes - Yermo y Parres</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

<div id="vista-login">
    <div class="login-card">
        <div class="text-center mb-3">
            <img src="img/escudo.png" alt="Escudo Yermo y Parres" class="escudo-logo">
            <div class="role-badge mt-2">Portal Docente</div>
            <h2 class="login-title">Bienvenido, Profesor</h2>
            <p class="login-subtitle">Ingrese sus credenciales para continuar</p>
        </div>
        <div class="login-divider"></div>

        <div class="mb-3">
            <label class="form-label fw-semibold" style="font-size:0.88rem;">
                <i class="bi bi-person me-1"></i>Usuario, Documento o Correo
            </label>
            <input type="text" class="form-control" id="login-correo"
                   placeholder="Usuario, documento o correo institucional">
        </div>
        <div class="mb-4">
            <label class="form-label fw-semibold" style="font-size:0.88rem;">
                <i class="bi bi-lock me-1"></i>Contraseña
            </label>
            <input type="password" class="form-control" id="login-pass" placeholder="••••••••">
        </div>

        <button class="btn-ingresar mb-3" onclick="iniciarSesion()">
            <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar
        </button>

        <div class="text-center">
            <a href="#" class="forgot-link">¿Olvidó su contraseña?</a>
        </div>
        <div class="text-center">
            <a href="index.html" class="btn-volver">
                <i class="bi bi-arrow-left me-1"></i>Volver al inicio
            </a>
        </div>
    </div>
</div>

<script src="js/api.js"></script>
<script>
    async function iniciarSesion() {
        const correo = document.getElementById('login-correo').value.trim();
        const pass   = document.getElementById('login-pass').value;
        if (!correo || !pass) { alert('Complete todos los campos.'); return; }

        try {
            // Llama al backend, valida contra MySQL y guarda el token JWT
            await login(correo, pass, 'docente');
            window.location.href = 'dashboard-docente.html';
        } catch (err) {
            alert(err.message); // ej: "Credenciales incorrectas."
        }
    }

    // Enter para iniciar sesión
    document.addEventListener('keydown', e => {
        if (e.key === 'Enter') iniciarSesion();
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
